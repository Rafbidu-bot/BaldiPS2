name: Compilar Jogo de PS2

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Baixar o código do jogo
        uses: actions/checkout@v4

      - name: Compilar o baldi.elf
        run: |
          mips64r5900el-ps2-elf-g++ -o baldi.elf main.cpp -lgs -lpad

      - name: Guardar o arquivo pronto
        uses: actions/upload-artifact@v4
        with:
          name: Jogo-Baldi-ELF
          path: baldi.elf
