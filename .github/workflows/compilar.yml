name: Compilar Jogo de PS2

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Baixar o código do jogo
        uses: actions/checkout@v4

      - name: Compilar o baldi.elf
        run: |
          /usr/local/ps2dev/ee/bin/ee-g++ -o baldi.elf main.cpp -I/usr/local/ps2dev/ee/ee/include -L/usr/local/ps2dev/ee/ee/lib -lgs -lpad

      - name: Guardar o arquivo pronto
        uses: actions/upload-artifact@v4
        with:
          name: Jogo-Baldi-ELF
          path: baldi.elf
